<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindful Space</title>
    <style>
        /* Basic styling for a calm interface */
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .container { text-align: center; }
        #visitor-count { font-size: 5rem; font-weight: bold; color: #2E7D32; }
        p { font-size: 1.2rem; color: #555; }
        .breathing-guide { display: none; }
        .breathing-circle { width: 100px; height: 100px; border-radius: 50%; background-color: #66bb6a; transition: transform 2s ease-in-out; margin: 20px auto; }
        #breathing-text { font-size: 1.5rem; color: #1B5E20; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <p>Visitors currently in the Mindful Space:</p>
        <div id="visitor-count">...</div>
        <hr style="margin: 20px 0;">
        <div id="breathing-guide" class="breathing-guide">
            <div id="breathing-circle" class="breathing-circle"></div>
            <p id="breathing-text">Ready?</p>
        </div>
        <button id="start-breathing">Start 4-7-8 Breathing</button>
    </div>
    <script>
        const socket = new WebSocket('wss://mindful-server-demo.herokuapp.com/'); // Placeholder or local
        // For MVP demo, we simulate connection if server is offline
        const visitorCountEl = document.getElementById('visitor-count');
        const startBtn = document.getElementById('start-breathing');
        const guideEl = document.getElementById('breathing-guide');
        const circleEl = document.getElementById('breathing-circle');
        const textEl = document.getElementById('breathing-text');

        // Simulate random visitors for the demo feel
        let count = 12;
        visitorCountEl.textContent = count;

        startBtn.onclick = () => {
            guideEl.style.display = 'block';
            startBtn.style.display = 'none';
            runBreathingCycle();
        };

        function runBreathingCycle() {
            // Inhale: 4 seconds
            runPhase("Breathe In", 4, 1.5, () => {
                // Hold: 7 seconds
                runPhase("Hold", 7, 1.5, () => {
                    // Exhale: 8 seconds
                    runPhase("Breathe Out", 8, 1.0, () => {
                        // Loop
                        runBreathingCycle();
                    });
                });
            });
        }

        function runPhase(action, duration, scale, callback) {
            circleEl.style.transition = `transform ${duration}s linear`;
            circleEl.style.transform = `scale(${scale})`;
            
            let remaining = duration;
            textEl.textContent = `${action} (${remaining})`;
            
            const interval = setInterval(() => {
                remaining--;
                if (remaining > 0) {
                    textEl.textContent = `${action} (${remaining})`;
                } else {
                    clearInterval(interval);
                    callback();
                }
            }, 1000);
        }
    </script>
</body>
</html>
